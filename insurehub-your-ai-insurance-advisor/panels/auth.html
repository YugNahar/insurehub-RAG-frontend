<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InsureHub — Admin Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #4f8ef7;
    --accent-hover: #3a7be0;
    --text: #e8eaf0;
    --muted: #7a7f94;
    --error: #f76f6f;
    --success: #4fcf8e;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: -0.4px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 18px;
  }

  input:focus { border-color: var(--accent); }

  button {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    margin-top: 4px;
  }

  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    background: rgba(247, 111, 111, 0.1);
    border: 1px solid rgba(247, 111, 111, 0.3);
    color: var(--error);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 14px;
    display: none;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <div>
      <div class="logo-text">InsureHub</div>
      <div class="logo-sub">Admin Portal</div>
    </div>
  </div>

  <h1>Sign in</h1>
  <p class="subtitle">Admin access only. Enter your backend URL once to get started.</p>

  <label for="backendUrl">Backend URL</label>
  <input type="url" id="backendUrl" placeholder="https://your-tunnel.trycloudflare.com" autocomplete="off" />

  <label for="username">Username</label>
  <input type="text" id="username" placeholder="admin" autocomplete="username" />

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />

  <button id="loginBtn" onclick="handleLogin()">Sign in</button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
  // __API_URL__ is replaced by the Vite build plugin with VITE_API_BASE_URL at deploy time.
  // Falls back to localStorage so the field can still be overridden manually.
  const _BUILT_IN_API = '__API_URL__';
  function getBackendUrl() {
    const stored = localStorage.getItem('insure_backend_url') || '';
    return (stored || _BUILT_IN_API).replace(/\/$/, '');
  }
  function setBackendUrl(url) {
    localStorage.setItem('insure_backend_url', url.replace(/\/$/, ''));
  }

  // Pre-fill saved backend URL
  const savedUrl = getBackendUrl();
  if (savedUrl) document.getElementById('backendUrl').value = savedUrl;

  // If already logged in, verify and go straight to admin
  const _existingToken = localStorage.getItem('insure_token');
  if (_existingToken && getBackendUrl()) {
    fetch(`${getBackendUrl()}/auth/verify`, {
      headers: { Authorization: 'Bearer ' + _existingToken }
    }).then(r => { if (r.ok) window.location.href = '/admin'; }).catch(() => {});
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  async function handleLogin() {
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    const backendUrl = document.getElementById('backendUrl').value.trim().replace(/\/$/, '');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!backendUrl) { showError('Please enter the Backend URL.'); return; }
    if (!username || !password) { showError('Please enter both username and password.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';
    err.style.display = 'none';

    try {
      const res = await fetch(`${backendUrl}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (res.ok) {
        const data = await res.json();
        setBackendUrl(backendUrl);
        localStorage.setItem('insure_token', data.access_token);
        localStorage.setItem('insure_user', username);
        window.location.href = '/admin';
      } else {
        const data = await res.json().catch(() => ({}));
        showError(data.detail || 'Incorrect username or password.');
      }
    } catch (e) {
      showError('Cannot reach the server. Check the Backend URL and your connection.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Sign in';
    }
  }

  function showError(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.style.display = 'block';
  }
</script>
</body>
</html>
